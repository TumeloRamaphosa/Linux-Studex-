# =============================================================================
# Linux StudEx — Agent OS Tmux Configuration
# =============================================================================

# Set prefix to Ctrl+B (default)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Terminal settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -g focus-events on

# Mouse support
set -g mouse on
set -g mode-keys vi

# History
set -g history-limit 50000

# Status bar — Studex Gold/Obsidian theme
set -g status-style "bg=#0A0A0A,fg=#F0EDE8"
set -g status-left "#[fg=#C9A84C,bg=#0A0A0A,bold] ◆ LX #[fg=#A09888]"
set -g status-left-length 40
set -g status-right "#[fg=#6B6560]%H:%M #[fg=#C9A84C]%d-%b-%y"
set -g status-right-length 60
set -g status-justify centre

# Window status
setw -g window-status-format " #[fg=#6B6560]#I:#W "
setw -g window-status-current-format " #[fg=#0A0A0A,bg=#C9A84C,bold]#I:#W "
setw -g window-status-separator " "
setw -g window-status-bell-style "fg=#0A0A0A,bg=#F44336,bold"

# Pane borders
set -g pane-border-style "fg=#2E2E2E"
set -g pane-active-border-style "fg=#C9A84C"

# Pane colours
set -g display-panes-colour "#C9A84C"
set -g display-panes-active-colour "#F0EDE8"

# Message styling
set -g message-style "bg=#1A1A1A,fg=#C9A84C"
set -g message-command-style "bg=#1A1A1A,fg=#C9A84C"

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h
bind '"' split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (vim-style)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Smart pane switching with Shift+Arrows
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Zoom pane
bind z resize-pane -Z

# Synchronize panes (send command to all)
bind S setw synchronize-panes \; display-message "synchronize: #{?synchronize-panes,ON,OFF}"

# =============================================================================
# Agent Session Setup
# =============================================================================

# Start the Linux StudEx session
# Run: tmux new-session -s linux-studex -n main \; source-file ~/.tmux.conf
#
# Agent windows:
#  0: main   — Master terminal (bash)
#  1: cashclaw  — RVS1 Financial Agent
#  2: hermes    — RVS2 Gateway/Orchestrator
#  3: openhuman — RVS3 Platform
#  4: cursor    — RVS4 IDE
#  5: farm      — RVS5-14 Agent Farm
#
# Quick launch:
#   tmux new-session -s linux-studex -n main \; \
#     new-window -n cashclaw \; \
#     new-window -n hermes \; \
#     new-window -n openhuman \; \
#     new-window -n cursor \; \
#     new-window -n farm \; \
#     select-window -t 0
